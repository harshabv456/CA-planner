<script>
// ── DATA ──────────────────────────────────────────────────────────────────────
const SUBJECTS=[
  {id:"aa",name:"Adv. Accounts",g:1,exam:new Date(2026,8,1)},
  {id:"cl",name:"Law",g:1,exam:new Date(2026,8,3)},
  {id:"dt",name:"Direct Tax",g:1,exam:new Date(2026,8,6)},
  {id:"it",name:"Indirect Tax",g:1,exam:new Date(2026,8,6)},
  {id:"cm",name:"Costing",g:2,exam:new Date(2026,8,8)},
  {id:"au",name:"Audit",g:2,exam:new Date(2026,8,10)},
  {id:"fm",name:"Fin. Mgmt",g:2,exam:new Date(2026,8,12)},
  {id:"sm",name:"Strategic Mgmt",g:2,exam:new Date(2026,8,12)},
];
const REV1_PAIRS=[["aa","au"],["cl","cm"],["dt","it"],["fm","sm"]];
const REV2_FIXED=[
  {ids:["fm","sm"],label:"FM & Strategic Mgmt",days:4,hasAIMT:false},
  {ids:["cm"],label:"Costing",days:4,hasAIMT:false},
  {ids:["au"],label:"Audit",days:4,hasAIMT:false},
  {ids:["cl"],label:"Law",days:3,hasAIMT:true},
  {ids:["dt","it"],label:"Direct Tax + Indirect Tax",days:4,hasAIMT:false},
];
const REV2_START=new Date(2026,7,2);
const PRE_EXAM_START=new Date(2026,7,27);
const CLASS_DEADLINES=[
  {label:"30th June",date:new Date(2026,5,30)},
  {label:"7th July",date:new Date(2026,6,7)},
  {label:"15th July",date:new Date(2026,6,15)},
];
const SLOTS=["Morning","Afternoon","Evening"];
const D={
  amber:"#FCD34D",amberBg:"rgba(252,211,77,0.10)",
  green:"#34D399",greenBg:"rgba(52,211,153,0.10)",
  purple:"#A78BFA",purpleBg:"rgba(167,139,250,0.10)",
  red:"#F87171",redBg:"rgba(248,113,113,0.10)",
  blue:"#60A5FA",blueBg:"rgba(96,165,250,0.10)",
  teal:"#2DD4BF",tealBg:"rgba(45,212,191,0.10)",
  pink:"#F472B6",pinkBg:"rgba(244,114,182,0.10)",
  indigo:"#818CF8",
};
const PHASE={
  c:{color:D.amber,bg:D.amberBg,label:"Classes"},
  r1:{color:D.purple,bg:D.purpleBg,label:"1st Revision"},
  r2:{color:D.green,bg:D.greenBg,label:"2nd Revision"},
};

// ── STATE ─────────────────────────────────────────────────────────────────────
const today=new Date(); today.setHours(0,0,0,0);
function toD(s){const d=new Date(s);d.setHours(0,0,0,0);return d;}
function addDays(d,n){const r=new Date(d);r.setDate(r.getDate()+n);return r;}
function sameDay(a,b){return a.toDateString()===b.toDateString();}
function fmt(d){return d.toLocaleDateString("en-IN",{weekday:"short",day:"numeric",month:"short"});}
function fmtS(d){return d.toLocaleDateString("en-IN",{day:"numeric",month:"short"});}
function isExam(d){return SUBJECTS.some(s=>sameDay(s.exam,d));}
function sName(id){return SUBJECTS.find(s=>s.id===id)?.name||id;}
function rnd(n){return Math.round(n*10)/10;}

// Persist state — localStorage with cookie fallback
function loadState(){
  try{
    const s=localStorage.getItem("ca_planner_state");
    if(s)return JSON.parse(s);
    // cookie fallback
    const c=document.cookie.split(";").find(x=>x.trim().startsWith("ca_state="));
    if(c)return JSON.parse(decodeURIComponent(c.split("=")[1]));
  }catch(e){}
  return null;
}
function saveState(s){
  try{
    const str=JSON.stringify(s);
    localStorage.setItem("ca_planner_state",str);
    // also write cookie (expires 180 days) as fallback
    const exp=new Date(Date.now()+180*864e5).toUTCString();
    document.cookie=`ca_state=${encodeURIComponent(str)};expires=${exp};path=/;SameSite=Lax`;
  }catch(e){}
}

const saved=loadState();
// Restore schedule: revive Date objects from saved JSON strings
let restoredSchedule=null;
if(saved?.schedule){
  try{
    restoredSchedule=saved.schedule.map(d=>({...d,date:new Date(d.date),examSubj:d.examSubj?{...d.examSubj,exam:new Date(d.examSubj.exam)}:undefined}));
  }catch(e){restoredSchedule=null;}
}
let state={
  step:saved?.step||1,
  startDate:saved?.startDate||today.toISOString().slice(0,10),
  classDL:saved?.classDL||CLASS_DEADLINES[2].date.toISOString().slice(0,10),
  spdC:saved?.spdC||3,
  hours:saved?.hours||Object.fromEntries(SUBJECTS.flatMap(s=>[[`${s.id}_c`,30],[`${s.id}_r1`,20],[`${s.id}_r2`,15]])),
  classOrder:saved?.classOrder||SUBJECTS.map(s=>s.id),
  schedule:restoredSchedule,
};

function persist(){saveState({startDate:state.startDate,classDL:state.classDL,spdC:state.spdC,hours:state.hours,classOrder:state.classOrder,step:state.step,schedule:state.schedule,rowStatus:state.rowStatus});}

// ── SCHEDULER ─────────────────────────────────────────────────────────────────
function buildSchedule(){
  const {hours,startDate,classDL,spdC,classOrder}=state;
  const start=toD(startDate),classDead=toD(classDL);
  const activeIds=new Set(SUBJECTS.filter(s=>(hours[`${s.id}_c`]||0)+(hours[`${s.id}_r1`]||0)+(hours[`${s.id}_r2`]||0)>0).map(s=>s.id));
  const sched=[];
  function push(date,type,payload){sched.push({date:new Date(date),type,...payload});}

  // Phase 1: Classes
  const ordIds=classOrder.filter(id=>activeIds.has(id)&&(hours[`${id}_c`]||0)>0);
  if(ordIds.length){
    const tasks=ordIds.map(id=>({id,total:hours[`${id}_c`]||0,done:0}));
    const totalC=tasks.reduce((s,t)=>s+t.total,0);
    let sd=0,tmp=new Date(start);
    while(tmp<classDead){if(!isExam(tmp))sd++;tmp=addDays(tmp,1);}
    const hpd=sd>0?totalC/sd:0,hps=hpd/Math.min(spdC,ordIds.length);
    let cur=new Date(start),ptr=0;
    while(cur<classDead){
      if(isExam(cur)){push(cur,"exam",{examSubj:SUBJECTS.find(s=>sameDay(s.exam,cur))});cur=addDays(cur,1);continue;}
      const entries=[],used=new Set(),slots=Math.min(spdC,ordIds.length);
      for(let sl=0;sl<slots;sl++){
        let found=-1;
        for(let k=0;k<tasks.length;k++){const idx=(ptr+k)%tasks.length;if(tasks[idx].done<tasks[idx].total-0.01&&!used.has(idx)){found=idx;break;}}
        if(found===-1)break;
        used.add(found);
        const alloc=rnd(Math.min(hps,tasks[found].total-tasks[found].done));
        tasks[found].done+=alloc;
        entries.push({phase:"c",id:tasks[found].id,hrs:alloc,slot:SLOTS[sl]});
      }
      if(used.size>0){ptr=(Math.max(...used)+1)%tasks.length;}
      push(cur,"study",{entries});cur=addDays(cur,1);
    }
  }

  // Phase 2: Rev1
  const r1Start=addDays(classDead,1),r1End=new Date(REV2_START);
  const pairTasks=REV1_PAIRS.map(pair=>{
    const active=pair.filter(id=>activeIds.has(id)&&(hours[`${id}_r1`]||0)>0);
    if(!active.length)return null;
    const sH=active.map(id=>({id,total:hours[`${id}_r1`]||0,done:0}));
    return{sH,total:sH.reduce((s,x)=>s+x.total,0),done:0};
  }).filter(Boolean);
  const pairedIds=new Set(REV1_PAIRS.flat());
  SUBJECTS.forEach(s=>{if(activeIds.has(s.id)&&!pairedIds.has(s.id)&&(hours[`${s.id}_r1`]||0)>0)pairTasks.push({sH:[{id:s.id,total:hours[`${s.id}_r1`]||0,done:0}],total:hours[`${s.id}_r1`]||0,done:0});});
  const totalR1=pairTasks.reduce((s,p)=>s+p.total,0);
  let sd2=0,tmp2=new Date(r1Start);
  while(tmp2<r1End){if(!isExam(tmp2))sd2++;tmp2=addDays(tmp2,1);}
  const hpdR1=sd2>0?totalR1/sd2:0;
  let cur2=new Date(r1Start),pp=0;
  while(cur2<r1End){
    if(isExam(cur2)){push(cur2,"exam",{examSubj:SUBJECTS.find(s=>sameDay(s.exam,cur2))});cur2=addDays(cur2,1);continue;}
    while(pp<pairTasks.length&&pairTasks[pp].done>=pairTasks[pp].total-0.01)pp++;
    if(pp>=pairTasks.length){push(cur2,"free",{entries:[]});cur2=addDays(cur2,1);continue;}
    const pair=pairTasks[pp];
    const alloc=rnd(Math.min(hpdR1,pair.total-pair.done));
    pair.done+=alloc;
    const entries=[],subRem=pair.sH.reduce((s,x)=>s+(x.total-x.done),0);
    pair.sH.forEach((subj,si)=>{const rem=subj.total-subj.done;if(rem<=0.01)return;const ratio=subRem>0?rem/subRem:1/pair.sH.length;const a=rnd(alloc*ratio);subj.done+=a;entries.push({phase:"r1",id:subj.id,hrs:a,slot:SLOTS[si]});});
    push(cur2,"study",{entries});cur2=addDays(cur2,1);
  }

  // Phase 3: Rev2
  let cur3=new Date(REV2_START);
  for(const block of REV2_FIXED){
    const aIds=block.ids.filter(id=>activeIds.has(id)&&(hours[`${id}_r2`]||0)>0);
    if(!aIds.length)continue;
    const tot=aIds.reduce((s,id)=>s+(hours[`${id}_r2`]||0),0),hpd=tot/block.days;
    for(let d=0;d<block.days;d++){
      while(isExam(cur3)){push(cur3,"exam",{examSubj:SUBJECTS.find(s=>sameDay(s.exam,cur3))});cur3=addDays(cur3,1);}
      if(cur3>=PRE_EXAM_START)break;
      const st=aIds.reduce((s,id)=>s+(hours[`${id}_r2`]||0),0);
      const entries=aIds.map((id,si)=>({phase:"r2",id,hrs:rnd(hpd*(st>0?(hours[`${id}_r2`]||0)/st:1/aIds.length)),slot:aIds.length>1?SLOTS[si]:"Full Day"}));
      push(cur3,"study",{entries});cur3=addDays(cur3,1);
    }
    while(isExam(cur3)){push(cur3,"exam",{examSubj:SUBJECTS.find(s=>sameDay(s.exam,cur3))});cur3=addDays(cur3,1);}
    if(cur3<PRE_EXAM_START){push(cur3,block.hasAIMT?"aimt":"test",{gids:aIds,blockLabel:block.label});cur3=addDays(cur3,1);}
  }

  // Pre-exam
  const aaH=hours["aa_r2"]||0,hpdAA=rnd(aaH/5);
  for(let d=0;d<5;d++){const dt=addDays(PRE_EXAM_START,d);push(dt,"preexam",{entries:aaH>0?[{phase:"r2",id:"aa",hrs:hpdAA,slot:"Full Day"}]:[]});}

  // Ensure all exam days
  [...new Set(SUBJECTS.map(s=>s.exam.toDateString()))].forEach(ds=>{
    if(!sched.some(d=>d.date.toDateString()===ds)){const s=SUBJECTS.find(x=>x.exam.toDateString()===ds);sched.push({date:new Date(s.exam),type:"exam",examSubj:s});}
  });
  return sched.sort((a,b)=>a.date-b.date);
}

// ── DERIVED ───────────────────────────────────────────────────────────────────
function derived(){
  const {hours,startDate,classDL}=state;
  const classDead=toD(classDL);
  const classDays=Math.max(1,Math.round((classDead-toD(startDate))/86400000));
  const totalC=SUBJECTS.reduce((s,sub)=>s+(hours[`${sub.id}_c`]||0),0);
  const totalR1=SUBJECTS.reduce((s,sub)=>s+(hours[`${sub.id}_r1`]||0),0);
  const totalR2=SUBJECTS.filter(s=>s.id!=="aa").reduce((s,sub)=>s+(hours[`${sub.id}_r2`]||0),0);
  const rev1Days=Math.max(1,Math.round((REV2_START-addDays(classDead,1))/86400000));
  const rev1Start=addDays(classDead,1);
  return{classDead,classDays,totalC,totalR1,totalR2,rev1Days,rev1Start,
    hpdC:(totalC/classDays).toFixed(1),hpdR1:(totalR1/rev1Days).toFixed(1),hpdR2:(totalR2/25).toFixed(1)};
}

// ── RENDER HELPERS ─────────────────────────────────────────────────────────────
function el(tag,attrs,inner){
  const e=document.createElement(tag);
  Object.entries(attrs||{}).forEach(([k,v])=>{if(k==="style")Object.assign(e.style,v);else if(k==="class")e.className=v;else e.setAttribute(k,v);});
  if(inner!==undefined)e.innerHTML=inner;
  return e;
}
function phaseBadge(color,bg,label){
  return `<span class="phase-badge" style="color:${color};background:${bg}">${label}</span>`;
}

// ── PHASE STRIP ───────────────────────────────────────────────────────────────
function renderStrip(){
  const {classDead,rev1Start}=derived();
  const strip=document.getElementById("phase-strip");
  strip.innerHTML="";
  [
    {label:"Classes",sub:`${fmtS(toD(state.startDate))} → ${fmtS(classDead)}`,color:D.amber,bg:D.amberBg},
    {label:"1st Rev",sub:`${fmtS(rev1Start)} → Aug 1`,color:D.purple,bg:D.purpleBg},
    {label:"2nd Rev",sub:"Aug 2 → Aug 26",color:D.green,bg:D.greenBg},
    {label:"Pre-exam",sub:"Aug 27–31",color:D.red,bg:D.redBg},
    {label:"Exams",sub:"Sep 1 → Sep 12",color:D.blue,bg:D.blueBg},
  ].forEach(p=>{
    strip.insertAdjacentHTML("beforeend",`<div class="phase-card" style="background:${p.bg};border:1px solid ${p.color}25"><div class="phase-label" style="color:${p.color}">${p.label}</div><div class="phase-sub" style="color:${p.color}">${p.sub}</div></div>`);
  });
}

// ── TABS ──────────────────────────────────────────────────────────────────────
function renderTabs(){
  const tabs=document.getElementById("tabs");
  tabs.innerHTML="";
  ["1. Hours & Settings","2. Class Sequence","3. My Plan"].forEach((t,i)=>{
    const btn=el("button",{class:`tab${state.step===i+1?" active":""}`},t);
    if(i===2&&!state.schedule)btn.style.opacity=".35";
    btn.onclick=()=>{if(i<2||state.schedule){state.step=i+1;render();}};
    tabs.appendChild(btn);
  });
}

// ── STEP 1 ────────────────────────────────────────────────────────────────────
function renderStep1(){
  const dv=derived();
  const {hours,startDate,classDL,spdC}=state;
  let html=`
  <div class="settings-grid">
    <div>
      <div class="lbl">Start Date</div>
      <input type="date" id="startDate" value="${startDate}" style="width:100%"/>
    </div>
    <div>
      <div class="lbl">Finish Classes By</div>
      <div style="display:flex;gap:6px;flex-wrap:wrap">
        ${CLASS_DEADLINES.map(dl=>{
          const s=classDL===dl.date.toISOString().slice(0,10);
          return `<button onclick="setClassDL('${dl.date.toISOString().slice(0,10)}')" style="padding:5px 12px;border-radius:99px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid ${s?D.amber:"rgba(255,255,255,0.07)"};background:${s?D.amberBg:"transparent"};color:${s?D.amber:"#8B8FA8"}">${dl.label}</button>`;
        }).join("")}
      </div>
    </div>
    <div>
      <div class="lbl">Subjects/Day (Classes)</div>
      <select id="spdC" style="width:100%">
        <option value="2" ${spdC===2?"selected":""}>2 subjects/day</option>
        <option value="3" ${spdC===3?"selected":""}>3 subjects/day</option>
      </select>
    </div>
  </div>
  <div class="stat-grid">
    <div class="stat-card" style="background:${D.amberBg};border:1px solid ${D.amber}25"><div class="lbl" style="color:${D.amber}">Classes — daily hrs</div><div class="stat-v" style="color:${D.amber}">${dv.hpdC} hrs/day</div><div class="stat-s" style="color:${D.amber}">${dv.totalC} hrs ÷ ${dv.classDays} days</div></div>
    <div class="stat-card" style="background:${D.purpleBg};border:1px solid ${D.purple}25"><div class="lbl" style="color:${D.purple}">Rev 1 — daily hrs</div><div class="stat-v" style="color:${D.purple}">${dv.hpdR1} hrs/day</div><div class="stat-s" style="color:${D.purple}">${dv.totalR1} hrs ÷ ${dv.rev1Days} days</div></div>
    <div class="stat-card" style="background:${D.greenBg};border:1px solid ${D.green}25"><div class="lbl" style="color:${D.green}">Rev 2 — daily hrs (25d)</div><div class="stat-v" style="color:${D.green}">${dv.hpdR2} hrs/day</div><div class="stat-s" style="color:${D.green}">${dv.totalR2} hrs ÷ 25 days</div></div>
  </div>
  <div class="info-banner" style="background:${D.greenBg};border:1px solid ${D.green}25;color:${D.green}"><strong>Rev 1 pairs (fixed):</strong> Accounts+Audit · Law+Costing · Direct Tax+Indirect Tax · FM+Strategic Mgmt</div>
  <div class="info-banner" style="background:${D.amberBg};border:1px solid ${D.amber}25;color:${D.amber};margin-bottom:18px"><strong>Rev 2 (fixed Aug 2–26):</strong> FM+SM → Costing → Audit → Law (+AIMT) → DT+IDT → Aug 27–31: Adv. Accounts</div>
  `;

  [1,2].forEach(g=>{
    html+=`<div class="lbl" style="margin-bottom:8px">Group ${g} subjects</div><div class="subj-grid">`;
    const accent=g===1?D.blue:D.teal, accentBg=g===1?D.blueBg:D.tealBg;
    SUBJECTS.filter(s=>s.g===g).forEach(s=>{
      html+=`<div class="subj-card" style="border-top:2px solid ${accent}">
        <div class="subj-name">${s.name}</div>
        <div class="subj-exam">Exam: ${fmt(s.exam)}</div>
        ${["c","r1","r2"].map((k,ki)=>`
          <div class="hr-row">
            <span class="hr-lbl">${["Classes","1st Rev","2nd Rev"][ki]}</span>
            <input type="number" min="0" class="hr-inp" value="${hours[`${s.id}_${k}`]}" onchange="setHr('${s.id}_${k}',this.value)" oninput="setHr('${s.id}_${k}',this.value)"/>
            <span class="hr-unit">hrs${k==="r2"&&s.id==="aa"?' <span style="color:'+D.red+';font-size:10px">pre-exam</span>':''}</span>
          </div>`).join("")}
      </div>`;
    });
    html+=`</div>`;
  });

  html+=`<button class="btn-primary" onclick="goStep2()">Next: Set Class Sequence →</button>`;
  document.getElementById("content").innerHTML=html;
  document.getElementById("startDate").onchange=e=>{state.startDate=e.target.value;persist();render();};
  document.getElementById("spdC").onchange=e=>{state.spdC=Number(e.target.value);persist();render();};
}

// ── STEP 2 ────────────────────────────────────────────────────────────────────
function renderStep2(){
  const {classOrder,hours,spdC}=state;
  const filtered=classOrder.filter(id=>(hours[`${id}_c`]||0)>0);
  let html=`<div style="font-size:14px;font-weight:700;color:#F0F1F6;margin-bottom:4px">Set your class study sequence</div>
  <div style="font-size:13px;color:#8B8FA8;margin-bottom:16px">Planner cycles through subjects in this order — ${spdC} per day.</div>`;
  filtered.forEach((id,idx)=>{
    const s=SUBJECTS.find(x=>x.id===id);
    const accent=s.g===1?D.blue:D.teal,accentBg=s.g===1?D.blueBg:D.tealBg;
    html+=`<div class="seq-item">
      <div class="seq-num" style="background:${accentBg};color:${accent}">${idx+1}</div>
      <div class="seq-name">${s.name}</div>
      <div class="seq-hrs">${hours[`${id}_c`]} hrs</div>
      <button class="arr-btn" ${idx===0?"disabled":""} onclick="moveSeq('${id}',-1)">↑</button>
      <button class="arr-btn" ${idx===filtered.length-1?"disabled":""} onclick="moveSeq('${id}',1)">↓</button>
    </div>`;
  });
  html+=`<div style="display:flex;gap:10px;margin-top:8px">
    <button class="btn-sec" onclick="state.step=1;render()">← Back</button>
    <button class="btn-primary" style="margin-top:0" onclick="generate()">Generate My AIR 1 Plan →</button>
  </div>`;
  document.getElementById("content").innerHTML=html;
}

// ── STEP 3 ────────────────────────────────────────────────────────────────────
function renderStep3(){
  const dv=derived();
  const aaHpd=rnd((state.hours["aa_r2"]||0)/5);
  let html=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:8px">
    <div style="font-size:15px;font-weight:700;color:#F0F1F6">Your day-wise plan</div>
    <button class="btn-sec" style="padding:7px 16px;font-size:13px" onclick="state.step=1;render()">← Edit Inputs</button>
  </div>
  <div class="plan-stats">
    <div class="stat-card" style="background:${D.amberBg};border:1px solid ${D.amber}25"><div class="lbl" style="color:${D.amber}">Classes</div><div class="stat-v" style="color:${D.amber}">${dv.hpdC} hrs/day</div><div class="stat-s" style="color:${D.amber}">Until ${fmtS(dv.classDead)}</div></div>
    <div class="stat-card" style="background:${D.purpleBg};border:1px solid ${D.purple}25"><div class="lbl" style="color:${D.purple}">Rev 1</div><div class="stat-v" style="color:${D.purple}">${dv.hpdR1} hrs/day</div><div class="stat-s" style="color:${D.purple}">${fmtS(dv.rev1Start)} → Aug 1</div></div>
    <div class="stat-card" style="background:${D.greenBg};border:1px solid ${D.green}25"><div class="lbl" style="color:${D.green}">Rev 2</div><div class="stat-v" style="color:${D.green}">${dv.hpdR2} hrs/day</div><div class="stat-s" style="color:${D.green}">Aug 2 → Aug 26</div></div>
    <div class="stat-card" style="background:${D.redBg};border:1px solid ${D.red}25"><div class="lbl" style="color:${D.red}">Pre-exam</div><div class="stat-v" style="color:${D.red}">${aaHpd} hrs/day</div><div class="stat-s" style="color:${D.red}">Aug 27–31 · Accounts</div></div>
  </div>
  <div class="tbl-wrap"><table>
    <thead class="tbl-hdr"><tr><th>Date</th><th>Slot</th><th>Phase</th><th>Subject</th><th>Hours</th><th>Status</th></tr></thead>
    <tbody>`;

  state.schedule.forEach((day,i)=>{
    const fd=fmt(day.date),rb=i%2===0?"#0D0F14":"#13161E";
    if(day.type==="exam"){
      const gc=day.examSubj?.g===1?D.blue:D.teal,gbg=day.examSubj?.g===1?D.blueBg:D.tealBg;
      html+=`<tr style="background:${gbg};border-bottom:1px solid ${gc}20"><td style="padding:10px 12px;font-weight:700;color:${gc}">${fd}</td><td colspan="5" style="padding:10px 12px"><span style="background:${gc}25;color:${gc};font-size:11px;padding:2px 10px;border-radius:99px;font-weight:700;margin-right:8px">EXAM DAY</span><span style="font-weight:700;color:${gc}">${day.examSubj?.name}</span></td></tr>`;
      return;
    }
    if(day.type==="test"||day.type==="aimt"){
      const isA=day.type==="aimt",tc=isA?D.blue:D.pink,tbg=isA?D.blueBg:D.pinkBg;
      html+=`<tr style="background:${tbg};border-bottom:1px solid ${tc}20"><td style="padding:10px 12px;font-weight:700;color:${tc}">${fd}</td><td colspan="5" style="padding:10px 12px"><span style="background:${tc}25;color:${tc};font-size:11px;padding:2px 10px;border-radius:99px;font-weight:700;margin-right:8px">${isA?"ALL INDIA MOCK TEST":"TEST DAY"}</span><span style="font-weight:600;color:${tc}">${day.blockLabel}</span></td></tr>`;
      return;
    }
    if(day.type==="preexam"){
      const entries=day.entries||[];
      if(entries.length){
        entries.forEach((e,ei)=>{
          html+=`<tr style="background:${D.redBg};border-bottom:1px solid ${D.red}20">
            ${ei===0?`<td style="padding:8px 12px;font-weight:700;color:${D.red};vertical-align:top" rowspan="${entries.length}">${fd}</td>`:""}
            <td><span style="background:${D.red}25;color:${D.red};font-size:11px;padding:2px 8px;border-radius:99px;font-weight:700">PRE-EXAM</span></td>
            <td>${phaseBadge(PHASE.r2.color,PHASE.r2.bg,"2nd Revision")}</td>
            <td style="font-weight:600;color:${D.red}">${sName(e.id)}</td>
            <td style="font-weight:600;color:${D.red}">${e.hrs} hrs</td>
            <td>${statusSelect(i,ei)}</td></tr>`;
        });
      } else {
        html+=`<tr style="background:${D.redBg};border-bottom:1px solid ${D.red}20"><td style="padding:10px 12px;font-weight:700;color:${D.red}">${fd}</td><td colspan="5" style="padding:10px 12px;color:${D.red};font-weight:600">Adv. Accounts — Focused Prep</td></tr>`;
      }
      return;
    }
    if(!day.entries?.length){
      html+=`<tr style="background:${rb};border-bottom:1px solid rgba(255,255,255,0.07)"><td style="padding:8px 12px;color:#4A4E6A">${fd}</td><td colspan="5" style="color:#4A4E6A;font-size:12px">Buffer day</td></tr>`;
      return;
    }
    day.entries.forEach((e,ei)=>{
      const ph=PHASE[e.phase]||PHASE.c;
      html+=`<tr style="background:${rb};border-bottom:1px solid rgba(255,255,255,0.07)">
        ${ei===0?`<td style="padding:8px 12px;font-weight:600;color:#F0F1F6;vertical-align:top" rowspan="${day.entries.length}">${fd}</td>`:""}
        <td><span class="slot-badge">${e.slot}</span></td>
        <td>${phaseBadge(ph.color,ph.bg,ph.label)}</td>
        <td style="font-weight:600;color:${ph.color}">${sName(e.id)}</td>
        <td style="font-weight:600;color:${ph.color}">${e.hrs} hrs</td>
        <td>${statusSelect(i,ei)}</td></tr>`;
    });
  });
  html+=`</tbody></table></div>`;
  document.getElementById("content").innerHTML=html;
}

// ── ACTIONS ───────────────────────────────────────────────────────────────────
// Status tracking
if(!saved?.rowStatus) state.rowStatus={};
else state.rowStatus=saved.rowStatus||{};

const STATUS_OPTS=[
  {val:"",label:"— Set Status —",color:"#4A4E6A",bg:"transparent"},
  {val:"done",label:"✅ Done",color:"#34D399",bg:"rgba(52,211,153,0.12)"},
  {val:"inprogress",label:"🔄 In Progress",color:"#FCD34D",bg:"rgba(252,211,77,0.12)"},
  {val:"pending",label:"⏳ Pending",color:"#A78BFA",bg:"rgba(167,139,250,0.12)"},
  {val:"rescheduled",label:"📅 Rescheduled",color:"#F87171",bg:"rgba(248,113,113,0.12)"},
];

function statusKey(dayIdx,entryIdx){return `${dayIdx}_${entryIdx}`;}
function statusSelect(dayIdx,entryIdx){
  const k=statusKey(dayIdx,entryIdx);
  const cur=state.rowStatus[k]||"";
  const opt=STATUS_OPTS.find(o=>o.val===cur)||STATUS_OPTS[0];
  const opts=STATUS_OPTS.map(o=>`<option value="${o.val}" ${o.val===cur?"selected":""}>${o.label}</option>`).join("");
  return `<select onchange="setStatus('${k}',this.value,this)" style="font-size:11px;padding:3px 6px;border-radius:8px;border:1px solid rgba(255,255,255,0.1);background:${opt.bg};color:${opt.color};cursor:pointer;font-weight:600;min-width:130px">${opts}</select>`;
}

window.setStatus=(k,v,sel)=>{
  state.rowStatus[k]=v;
  persist();
  // update select color in-place without full re-render
  const opt=STATUS_OPTS.find(o=>o.val===v)||STATUS_OPTS[0];
  sel.style.background=opt.bg;
  sel.style.color=opt.color;
};

window.setHr=(k,v)=>{state.hours[k]=Math.max(0,Number(v)||0);persist();renderStrip();};
window.setClassDL=(v)=>{state.classDL=v;persist();render();};
window.goStep2=()=>{state.step=2;render();};
window.generate=()=>{state.schedule=buildSchedule();state.step=3;persist();render();};
window.moveSeq=(id,dir)=>{
  const o=[...state.classOrder];
  const filtered=o.filter(x=>(state.hours[`${x}_c`]||0)>0);
  const ci=o.indexOf(id),fi=filtered.indexOf(id);
  const neighbor=filtered[fi+dir];
  if(!neighbor)return;
  const ni=o.indexOf(neighbor);
  [o[ci],o[ni]]=[o[ni],o[ci]];
  state.classOrder=o;persist();render();
};

// ── MAIN RENDER ───────────────────────────────────────────────────────────────
function render(){
  renderStrip();renderTabs();
  if(state.step===1)renderStep1();
  else if(state.step===2)renderStep2();
  else if(state.step===3)renderStep3();
}

// ── PWA: Service Worker + Manifest ───────────────────────────────────────────
const manifest={
  name:"CA Inter Sept 2026 Planner",
  short_name:"CA Planner",
  description:"AIR 1 Study Planner by CA Shubham Singhal",
  start_url:"./",
  display:"standalone",
  background_color:"#0D0F14",
  theme_color:"#0D0F14",
  icons:[
    {src:"https://i.postimg.cc/bwbQqxmg/Artboard-8-copy-12-3x-100.jpg",sizes:"192x192",type:"image/jpeg"},
    {src:"https://i.postimg.cc/bwbQqxmg/Artboard-8-copy-12-3x-100.jpg",sizes:"512x512",type:"image/jpeg"},
  ]
};
const mBlob=new Blob([JSON.stringify(manifest)],{type:"application/json"});
document.getElementById("manifest-placeholder").href=URL.createObjectURL(mBlob);

const SW_CODE=`
const CACHE="ca-planner-v2";
const SHELL=["/"];
self.addEventListener("install",e=>{e.waitUntil(caches.open(CACHE).then(c=>c.addAll(SHELL).catch(()=>{})));self.skipWaiting();});
self.addEventListener("activate",e=>{e.waitUntil(caches.keys().then(keys=>Promise.all(keys.filter(k=>k!==CACHE).map(k=>caches.delete(k)))));self.clients.claim();});
self.addEventListener("fetch",e=>{if(e.request.method!=="GET")return;e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request).then(res=>{if(res.ok){const clone=res.clone();caches.open(CACHE).then(c=>c.put(e.request,clone));}return res;}).catch(()=>caches.match("/")||new Response("Offline",{status:503}))));});
`;
if("serviceWorker" in navigator){
  const swBlob=new Blob([SW_CODE],{type:"application/javascript"});
  const swURL=URL.createObjectURL(swBlob);
  navigator.serviceWorker.register(swURL).then(()=>console.log("SW registered")).catch(e=>console.warn("SW failed",e));
}

// Install prompt
let deferredPrompt=null;
window.addEventListener("beforeinstallprompt",e=>{
  e.preventDefault();deferredPrompt=e;
  document.getElementById("install-bar").style.display="flex";
});
window.installApp=async()=>{
  if(deferredPrompt){await deferredPrompt.prompt();deferredPrompt=null;document.getElementById("install-bar").style.display="none";}
};

render();
</script>
